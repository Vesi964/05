<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин за скинове</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div>
            <h1>Магазин за предмети и скинове</h1>
            <p>Купувай скинове, оръжия и аксесоари за твоя герой.</p>
        </div>
        <div class="player-card">
            <img class="player-avatar" src="https://img.icons8.com/color/96/000000/user-male-circle.png" alt="Player Avatar">
            <div class="player-meta">
                <span class="player-name">Играч</span>
                <span class="player-level">Level 7</span>
            </div>
        </div>
        <div class="wallet">
            <span>Монети:</span>
            <strong id="coins">0</strong>
        </div>
    </header>

    <div class="lootbox-row">
        <button id="open-lootbox" class="lootbox-button">OPEN LOOT BOX</button>
    </div>

    <main class="container">
        <section class="shop-section">
            <div class="shop-top">
                <div>
                    <h2>Продукти</h2>
                    <p class="section-label">Филтрирай по категория и добави желаните елементи в кошницата.</p>
                </div>
                <div class="shop-controls">
                    <input id="search-input" class="search-input" type="search" placeholder="Търси продукти...">
                    <div id="category-filters" class="category-filters"></div>
                </div>
            </div>

            <div id="product-list" class="product-grid"></div>
        </section>

        <div class="right-panel">
            <section class="inventory-section">
                <h2>Инвентар</h2>
                <div id="inventory-list" class="inventory-list">
                    <p class="empty-note">Все още нямаш закупени предмети.</p>
                </div>
            </section>

            <section class="cart-section">
                <h2>Кошница</h2>
                <div id="cart-list" class="cart-list">
                    <p class="empty-note">Кошницата е празна. Добави предмети.</p>
                </div>
                <div class="cart-footer">
                    <div class="cart-total">
                        <span>Общо:</span>
                        <strong id="cart-total">0</strong>
                    </div>
                    <button id="checkout-button" class="checkout-button" disabled>Checkout</button>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
